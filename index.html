<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PNG Color Manipulation Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="min-h-screen flex items-center justify-center p-6 bg-cover bg-center"
    style="background-image: url('./assets/cloudbg.jpg')"
  >
    <div
      class="backdrop-blur-xl bg-white/70 border border-white/40 shadow-2xl rounded-3xl p-8 w-full max-w-5xl space-y-8"
    >
      <div class="text-center space-y-2">
        <h1
          class="text-4xl font-extrabold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent"
        >
          PNG Color Manipulation Tool
        </h1>
        <p class="text-gray-700 text-sm">
          Upload a PNG, click to pick a color, then remove or swap it instantly.
        </p>
      </div>

      <!-- Upload -->
      <div
        class="border-2 border-dashed border-blue-300 rounded-2xl p-6 text-center bg-white/60 hover:bg-white/80 transition"
      >
        <input
          type="file"
          id="upload"
          accept="image/png"
          class="block mx-auto mb-3 text-sm"
        />
        <p class="text-sm text-gray-600">Click the image below to pick a color</p>
      </div>

      <!-- Canvas -->
      <div class="flex justify-center">
        <div
          class="bg-white/80 p-4 rounded-2xl shadow-inner border border-gray-200"
        >
          <canvas
            id="canvas"
            class="rounded-lg max-w-full cursor-crosshair"
          ></canvas>
        </div>
      </div>

      <!-- Controls -->
      <div class="grid md:grid-cols-2 gap-8">
        <!-- Left Panel -->
        <div class="space-y-6">
          <!-- Selected Color -->
          <div
            class="flex items-center gap-4 bg-white/70 p-4 rounded-xl border"
          >
            <div
              id="colorPreview"
              class="w-10 h-10 rounded-lg border shadow-inner"
            ></div>
            <div>
              <p class="text-xs text-gray-500 uppercase tracking-wide">
                Selected Color
              </p>
              <p id="colorHex" class="font-mono text-lg">
                No color selected
              </p>
            </div>
          </div>

          <!-- Tolerance -->
          <div class="bg-white/70 p-4 rounded-xl border space-y-3">
            <label class="block font-medium text-gray-700">
              Tolerance:
              <span
                id="toleranceValue"
                class="font-bold text-blue-600"
                >0</span
              >
            </label>
            <input
              type="range"
              id="tolerance"
              min="0"
              max="100"
              value="0"
              class="w-full accent-blue-600"
            />
          </div>
        </div>

        <!-- Right Panel -->
        <div class="space-y-6">
          <!-- Tools -->
          <div class="bg-white/70 p-4 rounded-xl border space-y-4">
            <p class="text-xs text-gray-500 uppercase tracking-wide">
              Tools
            </p>
            <div class="flex flex-wrap gap-4">
              <button
                id="removeBtn"
                class="px-5 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 transition font-medium"
              >
                Remove Color
              </button>
              <button
                id="swapBtn"
                class="px-5 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 transition font-medium"
              >
                Swap Color
              </button>
              <input
                type="color"
                id="replacementColor"
                class="hidden w-12 h-10 p-0 border-0 bg-transparent"
              />
            </div>
          </div>

          <!-- Download -->
          <div class="text-center">
            <button
              id="downloadBtn"
              class="w-full py-3 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-semibold shadow-lg hover:scale-[1.02] active:scale-[0.98] transition"
            >
              Download PNG
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const uploadInput = document.getElementById("upload");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const toleranceSlider = document.getElementById("tolerance");
      const toleranceValue = document.getElementById("toleranceValue");
      const removeBtn = document.getElementById("removeBtn");
      const swapBtn = document.getElementById("swapBtn");
      const replacementColorInput = document.getElementById("replacementColor");
      const downloadBtn = document.getElementById("downloadBtn");
      const colorPreview = document.getElementById("colorPreview");
      const colorHex = document.getElementById("colorHex");

      let originalImageData = null;
      let selectedColor = null;
      let activeTool = null;

      function loadImage(file) {
        const img = new Image();
        img.onload = () => {
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0);
          originalImageData = ctx.getImageData(
            0,
            0,
            canvas.width,
            canvas.height
          );
        };
        img.src = URL.createObjectURL(file);
      }

      function pickColor(event) {
        if (!originalImageData) return;
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor(
          (event.clientX - rect.left) * (canvas.width / rect.width)
        );
        const y = Math.floor(
          (event.clientY - rect.top) * (canvas.height / rect.height)
        );
        const data = ctx.getImageData(x, y, 1, 1).data;
        selectedColor = { r: data[0], g: data[1], b: data[2] };
        const hex = rgbToHex(data[0], data[1], data[2]);
        colorPreview.style.backgroundColor = hex;
        colorHex.textContent = hex;
        processImage();
      }

      function rgbToHex(r, g, b) {
        return (
          "#" + [r, g, b].map((x) => x.toString(16).padStart(2, "0")).join("")
        );
      }

      function hexToRgb(hex) {
        const bigint = parseInt(hex.slice(1), 16);
        return {
          r: (bigint >> 16) & 255,
          g: (bigint >> 8) & 255,
          b: bigint & 255,
        };
      }

      function getThreshold() {
        const percent = parseInt(toleranceSlider.value);
        return (percent / 100) * 441;
      }

      function processImage() {
        if (!originalImageData || !selectedColor || !activeTool) {
          if (originalImageData)
            ctx.putImageData(originalImageData, 0, 0);
          return;
        }

        const imageData = new ImageData(
          new Uint8ClampedArray(originalImageData.data),
          originalImageData.width,
          originalImageData.height
        );

        const data = imageData.data;
        const threshold = getThreshold();
        let replacement = null;

        if (activeTool === "swap") {
          replacement = hexToRgb(replacementColorInput.value);
        }

        for (let i = 0; i < data.length; i += 4) {
          const dr = data[i] - selectedColor.r;
          const dg = data[i + 1] - selectedColor.g;
          const db = data[i + 2] - selectedColor.b;
          const distance = Math.sqrt(dr * dr + dg * dg + db * db);

          if (distance < threshold) {
            if (activeTool === "remove") {
              data[i + 3] = 0;
            } else if (activeTool === "swap") {
              data[i] = replacement.r;
              data[i + 1] = replacement.g;
              data[i + 2] = replacement.b;
            }
          }
        }

        ctx.putImageData(imageData, 0, 0);
      }

      function setActiveTool(tool) {
        activeTool = tool;
        removeBtn.classList.remove(
          "bg-gradient-to-r",
          "from-blue-600",
          "to-indigo-600",
          "text-white"
        );
        swapBtn.classList.remove(
          "bg-gradient-to-r",
          "from-blue-600",
          "to-indigo-600",
          "text-white"
        );
        replacementColorInput.classList.add("hidden");

        if (tool === "remove") {
          removeBtn.classList.add(
            "bg-gradient-to-r",
            "from-blue-600",
            "to-indigo-600",
            "text-white"
          );
        } else if (tool === "swap") {
          swapBtn.classList.add(
            "bg-gradient-to-r",
            "from-blue-600",
            "to-indigo-600",
            "text-white"
          );
          replacementColorInput.classList.remove("hidden");
        }

        processImage();
      }

      uploadInput.addEventListener("change", (e) => {
        if (e.target.files.length) loadImage(e.target.files[0]);
      });

      canvas.addEventListener("click", pickColor);

      toleranceSlider.addEventListener("input", () => {
        toleranceValue.textContent = toleranceSlider.value;
        processImage();
      });

      replacementColorInput.addEventListener("input", processImage);

      removeBtn.addEventListener("click", () =>
        setActiveTool("remove")
      );
      swapBtn.addEventListener("click", () =>
        setActiveTool("swap")
      );

      downloadBtn.addEventListener("click", () => {
        if (!originalImageData) return;
        const link = document.createElement("a");
        link.download = "edited.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      });
    </script>
  </body>
</html>
